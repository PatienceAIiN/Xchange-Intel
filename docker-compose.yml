services:
  redis:
    image: redis:7-alpine
    ports: ['6379:6379']
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    ports: ['3001:3001']
    depends_on: [redis]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports: ['5173:80']
    depends_on: [backend]
    restart: unless-stopped

# Postgres is hosted on Neon (see DATABASE_URL in .env), so no local pg service.
